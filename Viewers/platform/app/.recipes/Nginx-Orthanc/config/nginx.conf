worker_processes auto;
error_log /var/logs/nginx/mydomain.error.log;
pid /var/run/nginx.pid;
include /usr/share/nginx/modules/*.conf; # See /usr/share/doc/nginx/README.dynamic.

events {
  worker_connections 4096; ## Default: 1024
  use epoll; # http://nginx.org/en/docs/events.html
  multi_accept on; # http://nginx.org/en/docs/ngx_core_module.html#multi_accept
}

# Core Modules Docs:
# http://nginx.org/en/docs/http/ngx_http_core_module.html
http {
  include '/etc/nginx/mime.types';
  default_type application/octet-stream;

  keepalive_timeout 180;
  keepalive_requests 1000;
  proxy_read_timeout 300s;
  proxy_connect_timeout 300s;
  tcp_nopush on;
  tcp_nodelay on;
  client_max_body_size 500M;

  upstream monai_up {
    server monai_sam2:8002;
    keepalive 64;   # pool of idle connections to FastAPI
  }

  # Nginx `listener` block
  server {
    listen [::]:1026 default_server;
    listen 1026;
    server_name nninter.ccibonn.ai;
  
    #if ($http_cf_visitor !~ '"scheme":"https"') {
    #  return 301 https://$host$request_uri;
    #}

    gzip on;
    gzip_vary on;                     # send Vary: Accept-Encoding
    gzip_min_length 1024;             # don’t bother for tiny payloads
    gzip_comp_level 6;                # 6 is a good perf/ratio tradeoff
    gzip_proxied any;                 # <— IMPORTANT for proxied responses
    gzip_types
      application/json
      application/octet-stream
      multipart/form-data
      text/css
      application/javascript
      image/svg+xml;
    etag on;
    client_max_body_size 500M;

    # Reverse Proxy for `orthanc` APIs (including DICOMWeb)
    #
    location /pacs/ {

      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      client_max_body_size 500M;

      expires 0;
      add_header Cache-Control private;

      # Add CORS headers
      # Note: uncomment the following line to allow all domains to access the Orthanc APIs
      # You should actually only allow the domains you trust to access the APIs
      add_header 'Access-Control-Allow-Origin' '*' always;

      proxy_pass http://orthanc:8042/;

      # By default, this endpoint is protected by CORS (cross-origin-resource-sharing)
      # You can add headers to allow other domains to request this resource.
      # See the "Updating CORS Settings" example below
    }

    location /monai/ {
      proxy_pass http://monai_sam2:8002;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_request_buffering off;   # stream request to upstream
      proxy_buffering off;  

      proxy_buffer_size       16k;
      proxy_buffers           8 64k;
      proxy_busy_buffers_size 128k;

      gzip off;
      #proxy_set_header Accept-Encoding "";  # Disable gzip encoding
      
      # generous timeouts for inference
      proxy_connect_timeout 300s;
      proxy_read_timeout    300s;

      keepalive_timeout 180s;
      keepalive_requests 1000;

      client_max_body_size 500M;

      #expires 0;
      #add_header Cache-Control private;

      # Add CORS headers
      # Note: uncomment the following line to allow all domains to access the Orthanc APIs
      # You should actually only allow the domains you trust to access the APIs
      add_header 'Access-Control-Allow-Origin' '*' always;



      # By default, this endpoint is protected by CORS (cross-origin-resource-sharing)
      # You can add headers to allow other domains to request this resource.
      # See the "Updating CORS Settings" example below
    }

    # Proxy to Viewer-0512 (second OHIF instance)
    location /viewer-0512/ {
      proxy_pass http://ohif_orthanc_0512:1026/;
      proxy_http_version 1.1;
      
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # Handle SPA routing - proxy all requests
      proxy_redirect off;
      proxy_buffering off;
      
      client_max_body_size 500M;
      add_header 'Access-Control-Allow-Origin' '*' always;
    }
    
    # Redirect /viewer-0512 to /viewer-0512/ (with trailing slash)
    location = /viewer-0512 {
      return 301 /viewer-0512/;
    }

    # Proxy to MONAI Label 0512 (OHIF viewer served by MONAI Label)
    # OHIF is built with PUBLIC_URL=/monailabel-0512/, so assets use that prefix
    # But MONAI Label serves OHIF at /ohif/ endpoint, so we proxy /monailabel-0512/ to /ohif/
    location /monailabel-0512/ {
      proxy_pass http://monai_label_0512:8005/ohif/;
      proxy_http_version 1.1;
      
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # Handle SPA routing - proxy all requests
      proxy_redirect off;
      proxy_buffering off;
      
      client_max_body_size 500M;
      add_header 'Access-Control-Allow-Origin' '*' always;
    }
    
    # Redirect /monailabel-0512 to /monailabel-0512/ (with trailing slash)
    location = /monailabel-0512 {
      return 301 /monailabel-0512/;
    }

    # Proxy /proxy/ requests to MONAI Label 0512 (for DICOM proxy endpoints)
    # OHIF uses /proxy/dicom/qido and /proxy/dicom/wado to access Orthanc through MONAI Label
    location /proxy/ {
      proxy_pass http://monai_label_0512:8005/proxy/;
      proxy_http_version 1.1;
      
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      client_max_body_size 500M;
      add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Proxy MONAI Label 0512 API endpoints
    # Access MONAI Label API at /monailabel-0512-api/ instead of direct port 8005
    location /monailabel-0512-api/ {
      proxy_pass http://monai_label_0512:8005/;
      proxy_http_version 1.1;
      
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # Rewrite the path to remove /monailabel-0512-api prefix
      rewrite ^/monailabel-0512-api/(.*)$ /$1 break;
      
      client_max_body_size 500M;
      add_header 'Access-Control-Allow-Origin' '*' always;
    }
    
    # Redirect /monailabel-0512-api to /monailabel-0512-api/ (with trailing slash)
    location = /monailabel-0512-api {
      return 301 /monailabel-0512-api/;
    }

    # Do not cache sw.js, required for offline-first updates.
    location /sw.js {
      add_header Cache-Control "no-cache";
      proxy_cache_bypass $http_pragma;
      proxy_cache_revalidate on;
      expires off;
      access_log off;
    }

    # Single Page App
    # Try files, fallback to index.html
    #
    location / {
      root /var/www/html;
      index index.html;
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-store, no-cache, must-revalidate";
      add_header 'Access-Control-Allow-Origin' '*' always;

      #auth_basic           "Login Required";
      #auth_basic_user_file /etc/nginx/.htpasswd;

      client_max_body_size 800M;
    }
      error_page  405     =200 $uri;
  }
}
